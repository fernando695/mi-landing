<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR3 Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#1E1E1E;
  --cream:rgba(235,232,226,0.9);
  --mid:rgba(235,232,226,0.38);
  --faint:rgba(235,232,226,0.08);
}

html,body{height:100%;overflow:hidden}

body{
  background:var(--bg);
  color:var(--cream);
  font-family:'Jost',sans-serif;
  font-weight:200;
}

.page{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:48px 52px;
  position:relative;
  filter:blur(18px);
  transform:scale(1.02);
  transition:filter 0.04s linear, transform 0.04s linear;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.brand{
  font-weight:300;
  font-size:13px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--cream);
}

.year{
  font-weight:200;
  font-size:12px;
  letter-spacing:0.15em;
  color:var(--mid);
}

/* CENTER */
.center{
  position:absolute;
  top:50%;left:52px;right:52px;
  transform:translateY(-50%);
}

/* Small label above */
.center-label{
  font-weight:200;
  font-size:10px;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:var(--mid);
  margin-bottom:20px;
  display:block;
}

.main-text{
  font-family:'Cormorant Garamond',serif;
  font-weight:100;
  font-size:clamp(52px,8.5vw,108px);
  line-height:0.95;
  letter-spacing:-0.02em;
  color:var(--cream);
}
.main-text em{
  font-style:italic;
  color:var(--mid);
}

.dash{
  display:block;
  font-size:18px;
  color:var(--faint);
  margin:24px 0;
}

.meta{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.meta-line{
  font-weight:200;
  font-size:11px;
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:var(--mid);
}

/* BOTTOM */
.bottom{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
}

.form-row{
  display:flex;
  align-items:center;
  border-bottom:1px solid var(--faint);
  padding-bottom:10px;
  min-width:320px;
}

.form-input{
  background:transparent;border:none;outline:none;
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:11px;letter-spacing:0.18em;
  color:var(--cream);flex:1;
}
.form-input::placeholder{color:var(--mid)}

.form-btn{
  background:transparent;border:none;cursor:pointer;
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:11px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--mid);padding-left:20px;white-space:nowrap;
  transition:color 0.2s;
}
.form-btn:hover{color:var(--cream)}

#confirm{
  display:none;
  font-size:10px;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--mid);
  margin-top:12px;
}

/* SCROLL HINT */
.scroll-hint{
  position:fixed;
  bottom:28px;right:52px;
  font-size:9px;letter-spacing:0.25em;text-transform:uppercase;
  color:var(--mid);
  display:flex;align-items:center;gap:10px;
  transition:opacity 0.4s;
  pointer-events:none;
}
.scroll-line{
  width:28px;height:1px;background:var(--mid);
  transform-origin:left;
  animation:lb 2s ease-in-out infinite;
}
@keyframes lb{
  0%,100%{opacity:0.3;transform:scaleX(1)}
  50%{opacity:0.8;transform:scaleX(0.5)}
}
</style>
</head>
<body>

<div class="page" id="page">
  <div class="top">
    <span class="brand">AR3 Lab</span>
    <span class="year">2026</span>
  </div>

  <div class="center">
    <span class="center-label">Early access only</span>
    <h1 class="main-text">
      Engineered<br><em>for results.</em>
    </h1>
    <span class="dash">—</span>
    <div class="meta">
      <span class="meta-line">Performance Skincare</span>
      <span class="meta-line">Launching 2026</span>
    </div>
  </div>

  <div class="bottom">
    <div class="form-row">
      <input class="form-input" id="emailIn" type="email" placeholder="your@email.com" autocomplete="email">
      <button class="form-btn" onclick="sub()">Request Access →</button>
    </div>
    <div id="confirm">You're on the list.</div>
  </div>
</div>

<div class="scroll-hint" id="scrollHint">
  <div class="scroll-line"></div>
  Scroll
</div>

<script>
const page = document.getElementById('page');
const hint = document.getElementById('scrollHint');
const MAX  = 18;
let scrollY = 0;
const TOTAL = window.innerHeight;

function update(){
  const p = Math.min(1, scrollY / TOTAL);
  const blur = MAX * (1 - p);
  const scale = 1.02 - 0.02 * p;
  page.style.filter    = `blur(${blur}px)`;
  page.style.transform = `scale(${scale})`;
  hint.style.opacity   = Math.max(0, 1 - p * 3);
}

window.addEventListener('wheel', e => {
  scrollY = Math.max(0, Math.min(TOTAL, scrollY + e.deltaY * 0.8));
  update();
}, {passive:true});

let touchStart = 0;
window.addEventListener('touchstart', e => {
  touchStart = e.touches[0].clientY;
}, {passive:true});
window.addEventListener('touchmove', e => {
  const dy = touchStart - e.touches[0].clientY;
  scrollY = Math.max(0, Math.min(TOTAL, scrollY + dy * 1.2));
  touchStart = e.touches[0].clientY;
  update();
}, {passive:true});

update();

function sub(){
  const v = document.getElementById('emailIn').value.trim();
  if(!v || !v.includes('@')) return;
  document.getElementById('emailIn').value = '';
  document.getElementById('confirm').style.display = 'block';
}
document.getElementById('emailIn').addEventListener('keypress', e => {
  if(e.key === 'Enter') sub();
});
</script>
</body>
</html>
